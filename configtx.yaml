# =================================================================
# MIGRASI KE PRODUCTION:
#   sed -i 's/example\.com/DOMAIN_KAMU/g' configtx.yaml
# =================================================================

Organizations:

  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: crypto-config/ordererOrganizations/example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"

  # -------------------------------------------------------------------
  # KLINIK — Org dengan hak READ + WRITE
  # Hanya klinik yang boleh menerbitkan dan mencabut surat sakit
  # Writers: hanya admin & client (bukan peer) agar peer tidak bisa
  # submit transaksi tulis secara langsung tanpa melalui aplikasi
  # -------------------------------------------------------------------
  - &Klinik
    Name: KlinikMSP
    ID: KlinikMSP
    MSPDir: crypto-config/peerOrganizations/klinik.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('KlinikMSP.admin', 'KlinikMSP.peer', 'KlinikMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('KlinikMSP.admin', 'KlinikMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('KlinikMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('KlinikMSP.peer')"
    AnchorPeers:
      - Host: peer0.klinik.example.com
        Port: 7051

  # -------------------------------------------------------------------
  # AKADEMIK — Org dengan hak READ ONLY (verifikasi surat)
  # Writers tetap ada agar org bisa join channel & approve chaincode,
  # tapi endorsement policy chaincode mengunci write hanya ke KlinikMSP
  # -------------------------------------------------------------------
  - &Akademik
    Name: AkademikMSP
    ID: AkademikMSP
    MSPDir: crypto-config/peerOrganizations/akademik.example.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('AkademikMSP.admin', 'AkademikMSP.peer', 'AkademikMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('AkademikMSP.admin', 'AkademikMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('AkademikMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('AkademikMSP.peer')"
    AnchorPeers:
      - Host: peer0.akademik.example.com
        Port: 9051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_0: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    # -------------------------------------------------------------------
    # ENDORSEMENT POLICY GLOBAL (default untuk semua chaincode)
    # "OR" artinya cukup 1 org yang endorse — cocok karena hanya Klinik
    # yang akan submit transaksi tulis. Akademik hanya query (evaluate),
    # query tidak butuh endorsement policy.
    # -------------------------------------------------------------------
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: Signature
      Rule: "OR('KlinikMSP.peer')"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer.example.com:7050
  EtcdRaft:
    Consenters:
      - Host: orderer.example.com
        Port: 7050
        ClientTLSCert: crypto-config/ordererOrganizations/example.com/orderers/orderer.example.com/tls/server.crt
        ServerTLSCert: crypto-config/ordererOrganizations/example.com/orderers/orderer.example.com/tls/server.crt
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"
  Capabilities:
    <<: *OrdererCapabilities

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  # Genesis block — hanya 2 org
  TwoOrgsOrdererGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities:
        <<: *OrdererCapabilities
    Consortiums:
      MedConsortium:
        Organizations:
          - *Klinik
          - *Akademik

  # Channel untuk transaksi surat sakit
  TwoOrgsChannel:
    <<: *ChannelDefaults
    Consortium: MedConsortium
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Klinik
        - *Akademik
      Capabilities:
        <<: *ApplicationCapabilitiesd