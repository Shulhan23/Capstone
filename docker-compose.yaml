version: '2.4'

# =================================================================
# PRODUCTION — medchain.id
# Fabric CA + Raft 3 Orderer + CouchDB + Prometheus + Grafana
# =================================================================

volumes:
  orderer1.medchain.id:
  orderer2.medchain.id:
  orderer3.medchain.id:

  peer0.klinik.medchain.id:
  peer1.klinik.medchain.id:

  peer0.akademik.medchain.id:
  peer1.akademik.medchain.id:

  peer0.dokter.medchain.id:
  peer1.dokter.medchain.id:

  prometheus_data:
  grafana_data:

networks:
  fabric:
    name: fabric_network

services:

  # =============================================================
  # FABRIC CA — ORDERER ORG
  # =============================================================
  ca.orderer.medchain.id:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.orderer.medchain.id
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-orderer
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:17054
      - FABRIC_CA_SERVER_CSR_HOSTS=ca.orderer.medchain.id,localhost,127.0.0.1
    command: sh -c 'fabric-ca-server start -b ${CA_ADMIN_USER}:${CA_ADMIN_PASS} -d'
    volumes:
      - ./organizations/fabric-ca/orderer:/etc/hyperledger/fabric-ca-server
    ports:
      - 7054:7054
      - 17054:17054
    networks:
      - fabric
    restart: unless-stopped

  # =============================================================
  # FABRIC CA — KLINIK
  # =============================================================
  ca.klinik.medchain.id:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.klinik.medchain.id
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-klinik
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:18054
      - FABRIC_CA_SERVER_CSR_HOSTS=ca.klinik.medchain.id,localhost,127.0.0.1
    command: sh -c 'fabric-ca-server start -b ${CA_ADMIN_USER}:${CA_ADMIN_PASS} -d'
    volumes:
      - ./organizations/fabric-ca/klinik:/etc/hyperledger/fabric-ca-server
    ports:
      - 8054:8054
      - 18054:18054
    networks:
      - fabric
    restart: unless-stopped

  # =============================================================
  # FABRIC CA — AKADEMIK
  # =============================================================
  ca.akademik.medchain.id:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.akademik.medchain.id
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-akademik
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=9054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:19054
      - FABRIC_CA_SERVER_CSR_HOSTS=ca.akademik.medchain.id,localhost,127.0.0.1
    command: sh -c 'fabric-ca-server start -b ${CA_ADMIN_USER}:${CA_ADMIN_PASS} -d'
    volumes:
      - ./organizations/fabric-ca/akademik:/etc/hyperledger/fabric-ca-server
    ports:
      - 9054:9054
      - 19054:19054
    networks:
      - fabric
    restart: unless-stopped

  # =============================================================
  # FABRIC CA — DOKTEr
  # =============================================================

  ca.dokter.medchain.id:
    image: hyperledger/fabric-ca:1.5
    container_name: ca.dokter.medchain.id
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-dokter
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=10054
      - FABRIC_CA_SERVER_OPERATIONS_LISTENADDRESS=0.0.0.0:20054
      - FABRIC_CA_SERVER_CSR_HOSTS=ca.dokter.medchain.id,localhost,127.0.0.1
    command: sh -c 'fabric-ca-server start -b ${CA_ADMIN_USER}:${CA_ADMIN_PASS} -d'
    volumes:
      - ./organizations/fabric-ca/dokter:/etc/hyperledger/fabric-ca-server
    ports:
      - 10054:10054
      - 20054:20054
    networks:
      - fabric
    restart: unless-stopped

  # =============================================================
  # ORDERER 1 — RAFT LEADER CANDIDATE
  # =============================================================
  orderer1.medchain.id:
    container_name: orderer1.medchain.id
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:8443
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
    volumes:
      - ./channel-artifacts/orderer.genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./organizations/ordererOrganizations/medchain.id/orderers/orderer1.medchain.id/msp:/var/hyperledger/orderer/msp
      - ./organizations/ordererOrganizations/medchain.id/orderers/orderer1.medchain.id/tls:/var/hyperledger/orderer/tls
      - orderer1.medchain.id:/var/hyperledger/production/orderer
    ports:
      - 7050:7050
      - 7053:7053
      - 8443:8443
    networks:
      - fabric
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/7050' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # =============================================================
  # ORDERER 2 — RAFT FOLLOWER
  # =============================================================
  orderer2.medchain.id:
    container_name: orderer2.medchain.id
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=8050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:8444
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:8053
    volumes:
      - ./channel-artifacts/orderer.genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./organizations/ordererOrganizations/medchain.id/orderers/orderer2.medchain.id/msp:/var/hyperledger/orderer/msp
      - ./organizations/ordererOrganizations/medchain.id/orderers/orderer2.medchain.id/tls:/var/hyperledger/orderer/tls
      - orderer2.medchain.id:/var/hyperledger/production/orderer
    ports:
      - 8050:8050
      - 8053:8053
      - 8444:8444
    networks:
      - fabric
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/8050' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # =============================================================
  # ORDERER 3 — RAFT FOLLOWER
  # =============================================================
  orderer3.medchain.id:
    container_name: orderer3.medchain.id
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=9050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:8445
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:9053
    volumes:
      - ./channel-artifacts/orderer.genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./organizations/ordererOrganizations/medchain.id/orderers/orderer3.medchain.id/msp:/var/hyperledger/orderer/msp
      - ./organizations/ordererOrganizations/medchain.id/orderers/orderer3.medchain.id/tls:/var/hyperledger/orderer/tls
      - orderer3.medchain.id:/var/hyperledger/production/orderer
    ports:
      - 9050:9050
      - 9053:9053
      - 8445:8445
    networks:
      - fabric
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/9050' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # =============================================================
  # COUCHDB — KLINIK PEER0
  # =============================================================
  couchdb.klinik.peer0:
    container_name: couchdb.klinik.peer0
    image: couchdb:3.3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    ports:
      - 5984:5984
    volumes:
      - ./data/couchdb/klinik-peer0:/opt/couchdb/data
    networks:
      - fabric
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5984/_up"]
      interval: 15s
      timeout: 10s
      retries: 10

  # =============================================================
  # COUCHDB — KLINIK PEER1
  # =============================================================
  couchdb.klinik.peer1:
    container_name: couchdb.klinik.peer1
    image: couchdb:3.3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    ports:
      - 6984:5984
    volumes:
      - ./data/couchdb/klinik-peer1:/opt/couchdb/data
    networks:
      - fabric
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5984/_up"]
      interval: 15s
      timeout: 10s
      retries: 10

  # =============================================================
  # PEER0 — KLINIK (READ + WRITE)
  # =============================================================
  peer0.klinik.medchain.id:
    container_name: peer0.klinik.medchain.id
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.klinik.medchain.id
      - CORE_PEER_ADDRESS=peer0.klinik.medchain.id:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.klinik.medchain.id:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.klinik.medchain.id:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.klinik.medchain.id:7051
      - CORE_PEER_LOCALMSPID=KlinikMSP
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9443
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.klinik.peer0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD}
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/klinik.medchain.id/peers/peer0.klinik.medchain.id/msp:/etc/hyperledger/fabric/msp
      - ./organizations/peerOrganizations/klinik.medchain.id/peers/peer0.klinik.medchain.id/tls:/etc/hyperledger/fabric/tls
      - peer0.klinik.medchain.id:/var/hyperledger/production
    ports:
      - 7051:7051
      - 7052:7052
      - 9443:9443
    depends_on:
      couchdb.klinik.peer0:
        condition: service_healthy
      orderer1.medchain.id:
        condition: service_healthy
    networks:
      - fabric
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/7051' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # =============================================================
  # PEER1 — KLINIK
  # =============================================================
  peer1.klinik.medchain.id:
    container_name: peer1.klinik.medchain.id
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt

      # IDENTITAS PEER
      - CORE_PEER_ID=peer1.klinik.medchain.id
      - CORE_PEER_ADDRESS=peer1.klinik.medchain.id:7151
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7151

      # CHAINCODE PORT (WAJIB BEDA)
      - CORE_PEER_CHAINCODEADDRESS=peer1.klinik.medchain.id:7152
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7152

      # GOSSIP (INI KUNCI)
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.klinik.medchain.id:7151
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.klinik.medchain.id:7051

      - CORE_PEER_LOCALMSPID=KlinikMSP

      # OPERATIONS (MONITORING)
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:9543

      # COUCHDB (SAMA, BOLEH SHARE)
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.klinik.peer1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD}

    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/klinik.medchain.id/peers/peer1.klinik.medchain.id/msp:/etc/hyperledger/fabric/msp
      - ./organizations/peerOrganizations/klinik.medchain.id/peers/peer1.klinik.medchain.id/tls:/etc/hyperledger/fabric/tls
      - peer1.klinik.medchain.id:/var/hyperledger/production

    ports:
      - 7151:7151
      - 7152:7152
      - 9543:9543

    depends_on:
      couchdb.klinik.peer1:
        condition: service_healthy
      orderer1.medchain.id:
        condition: service_healthy

    networks:
      - fabric

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/7151' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # =============================================================
  # COUCHDB AKADEMIK
  # =============================================================
  couchdb.akademik.peer0:
    container_name: couchdb.akademik.peer0
    image: couchdb:3.3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    ports:
      - 7984:5984
    volumes:
      - ./data/couchdb/akademik:/opt/couchdb/data
    networks:
      - fabric
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5984/_up"]
      interval: 15s
      timeout: 10s
      retries: 10

  # =============================================================
  # COUCHDB — AKADEMIK PEER1
  # =============================================================
  couchdb.akademik.peer1:
    container_name: couchdb.akademik.peer1
    image: couchdb:3.3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    ports:
      - 8984:5984
    volumes:
      - ./data/couchdb/akademik-peer1:/opt/couchdb/data
    networks:
      - fabric
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5984/_up"]
      interval: 15s
      timeout: 10s
      retries: 10

  # =============================================================
  # PEER0 — AKADEMIK (READ ONLY)
  # =============================================================
  peer0.akademik.medchain.id:
    container_name: peer0.akademik.medchain.id
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=fabric_network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.akademik.medchain.id
      - CORE_PEER_ADDRESS=peer0.akademik.medchain.id:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.akademik.medchain.id:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.akademik.medchain.id:9051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.akademik.medchain.id:9051
      - CORE_PEER_LOCALMSPID=AkademikMSP
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:10443
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.akademik.peer0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD}
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./organizations/peerOrganizations/akademik.medchain.id/peers/peer0.akademik.medchain.id/msp:/etc/hyperledger/fabric/msp
      - ./organizations/peerOrganizations/akademik.medchain.id/peers/peer0.akademik.medchain.id/tls:/etc/hyperledger/fabric/tls
      - peer0.akademik.medchain.id:/var/hyperledger/production
    ports:
      - 9051:9051
      - 9052:9052
      - 10443:10443
    depends_on:
      couchdb.akademik.peer0:
        condition: service_healthy
      orderer1.medchain.id:
        condition: service_healthy
    networks:
      - fabric
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/9051' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # =============================================================
