  cli:
    container_name: cli
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true

    environment:
      - GOPATH=/opt/gopath
      - FABRIC_LOGGING_SPEC=INFO

      # DEFAULT CONTEXT (boleh klinik)
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.klinik.medchain.id:7051
      - CORE_PEER_LOCALMSPID=KlinikMSP

      # TLS
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/crypto/peerOrganizations/klinik.medchain.id/peers/peer0.klinik.medchain.id/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/crypto/peerOrganizations/klinik.medchain.id/peers/peer0.klinik.medchain.id/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/crypto/peerOrganizations/klinik.medchain.id/peers/peer0.klinik.medchain.id/tls/ca.crt

      # MSP ADMIN DEFAULT
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/crypto/peerOrganizations/klinik.medchain.id/users/Admin@klinik.medchain.id/msp

      # ORDERER TLS (pakai root CA, bukan spesifik 1 orderer)
      - ORDERER_CA=/etc/hyperledger/fabric/crypto/ordererOrganizations/medchain.id/orderers/orderer1.medchain.id/msp/tlscacerts/tlsca.medchain.id-cert.pem

      # PARAMETER (biar reusable)
      - CHANNEL_NAME=medchannel
      - CHAINCODE_NAME=medical

    working_dir: /etc/hyperledger/fabric

    command: /bin/bash

    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ./chaincode:/etc/hyperledger/fabric/chaincode
      - ./organizations:/etc/hyperledger/fabric/crypto
      - ./channel-artifacts:/etc/hyperledger/fabric/channel-artifacts
      - ./scripts:/etc/hyperledger/fabric/scripts

    depends_on:
      orderer1.medchain.id:
        condition: service_healthy
      peer0.klinik.medchain.id:
        condition: service_healthy
      peer0.akademik.medchain.id:
        condition: service_healthy
      peer0.dokter.medchain.id:
        condition: service_healthy

